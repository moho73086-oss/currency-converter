
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محوّل العملات العربية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ===== THEMES ===== */
:root,[data-theme="light"]{
  --blue:#2563EB;
  --blue-light:#EFF6FF;
  --blue-mid:#DBEAFE;
  --bg:#F5F7FA;
  --white:#FFFFFF;
  --border:#E2E8F0;
  --border-focus:#93C5FD;
  --text:#1E293B;
  --muted:#64748B;
  --muted2:#94A3B8;
  --selected-bg:#EFF6FF;
  --card-shadow:0 2px 12px rgba(0,0,0,.06);
  --btn-shadow:0 4px 14px rgba(37,99,235,.35);
  --btn-hover-shadow:0 8px 24px rgba(37,99,235,.45);
  --result-bg:var(--blue-light);
  --result-border:var(--border-focus);
  --theme-tab-bg:#F1F5F9;
  --theme-tab-border:#E2E8F0;
  --theme-active-bg:#FFFFFF;
  --theme-active-shadow:0 1px 4px rgba(0,0,0,.12);
  --theme-icon-active:var(--blue);
  --theme-label-active:var(--blue);
  --theme-label-inactive:var(--muted);
}

[data-theme="dark"]{
  --blue:#60A5FA;
  --blue-light:#1E3A5F;
  --blue-mid:#1e40af22;
  --bg:#0F172A;
  --white:#1E293B;
  --border:#334155;
  --border-focus:#3B82F6;
  --text:#F1F5F9;
  --muted:#94A3B8;
  --muted2:#64748B;
  --selected-bg:#1e3a5f;
  --card-shadow:0 2px 16px rgba(0,0,0,.4);
  --btn-shadow:0 4px 14px rgba(96,165,250,.25);
  --btn-hover-shadow:0 8px 24px rgba(96,165,250,.35);
  --result-bg:#3f1a1a;
  --result-border:#EF4444;
  --theme-tab-bg:#1E293B;
  --theme-tab-border:#334155;
  --theme-active-bg:#0F172A;
  --theme-active-shadow:0 1px 4px rgba(0,0,0,.5);
  --theme-icon-active:#60A5FA;
  --theme-label-active:#60A5FA;
  --theme-label-inactive:#64748B;
  --result-text:#EF4444;
}
[data-theme="dark"] .result-equals{color:#EF4444}
[data-theme="dark"] .result-card{
  background:rgba(239,68,68,0.08);
  border:1.5px solid rgba(239,68,68,0.35);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 8px 32px rgba(239,68,68,0.1), inset 0 1px 0 rgba(255,255,255,0.08);
}



body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 80px}

/* ===== THEME SWITCHER ===== */
.theme-switcher{display:flex;align-items:center;background:var(--theme-tab-bg);border:1px solid var(--theme-tab-border);border-radius:50px;padding:4px;gap:2px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:background .3s,border-color .3s}
.theme-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:50px;border:none;background:transparent;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.75rem;font-weight:600;color:var(--theme-label-inactive);transition:all .25s;white-space:nowrap}
.theme-btn.active{background:var(--theme-active-bg);box-shadow:var(--theme-active-shadow);color:var(--theme-label-active)}
.theme-btn .t-icon{font-size:.9rem;transition:transform .3s}
.theme-btn:hover:not(.active){color:var(--theme-label-active);opacity:.8}
.theme-btn.active .t-icon{transform:scale(1.1)}

/* HEADER */
header{text-align:center;margin-bottom:28px;width:100%;max-width:560px}
.header-top{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.header-icon{font-size:28px}
h1{font-size:1.4rem;font-weight:800;color:var(--text);letter-spacing:.5px;transition:color .3s}
.subtitle{font-size:.8rem;color:var(--muted);font-weight:400;transition:color .3s}
.live-dot{width:7px;height:7px;border-radius:50%;background:#94A3B8;flex-shrink:0;transition:background .3s}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.8;box-shadow:0 0 0 4px rgba(34,197,94,0)}}
.live-text{font-size:.7rem;color:var(--muted);font-weight:500;transition:color .3s}
.live-ts{font-size:.7rem;color:var(--blue);font-weight:700;direction:ltr;transition:color .3s}
@keyframes dollarFireUp{
  0%  {transform:scale(1)   rotate(0deg);  filter:drop-shadow(0 0 0px #f97316);  color:var(--blue)}
  10% {transform:scale(1.5) rotate(-8deg); filter:drop-shadow(0 0 12px #fb923c) drop-shadow(0 0 24px #fbbf24); color:#fb923c}
  25% {transform:scale(2.8) rotate(6deg);  filter:drop-shadow(0 0 28px #ef4444) drop-shadow(0 0 55px #f97316) drop-shadow(0 0 80px #fbbf24); color:#fef08a}
  45% {transform:scale(2.2) rotate(-4deg); filter:drop-shadow(0 0 22px #f97316) drop-shadow(0 0 44px #fbbf24); color:#fed7aa}
  65% {transform:scale(3.0) rotate(3deg);  filter:drop-shadow(0 0 36px #ef4444) drop-shadow(0 0 70px #f97316) drop-shadow(0 0 100px #fbbf24); color:#fff}
  80% {transform:scale(1.8) rotate(-2deg); filter:drop-shadow(0 0 16px #fb923c); color:#fb923c}
  100%{transform:scale(1)   rotate(0deg);  filter:drop-shadow(0 0 0px transparent); color:var(--blue)}
}
@keyframes dollarLoading{
  0%  {transform:scale(1)    rotate(0deg);  opacity:.5; filter:none}
  25% {transform:scale(1.35) rotate(-14deg);opacity:1;  filter:drop-shadow(0 0 8px #f97316)}
  50% {transform:scale(1)    rotate(0deg);  opacity:.5; filter:none}
  75% {transform:scale(1.35) rotate(14deg); opacity:1;  filter:drop-shadow(0 0 8px #f97316)}
  100%{transform:scale(1)    rotate(0deg);  opacity:.5; filter:none}
}
@keyframes badgeFire{
  0%  {box-shadow:var(--card-shadow); border-color:var(--border);  transform:scale(1)}
  20% {box-shadow:0 0 0 5px rgba(251,146,60,.35), 0 0 50px rgba(239,68,68,.6);  border-color:#f97316; transform:scale(1.07)}
  45% {box-shadow:0 0 0 10px rgba(251,191,36,.2), 0 0 90px rgba(249,115,22,.7); border-color:#fbbf24; transform:scale(1.04)}
  70% {box-shadow:0 0 0 16px rgba(239,68,68,.08),0 0 120px rgba(251,146,60,.4); transform:scale(1.02)}
  100%{box-shadow:var(--card-shadow); border-color:var(--border);  transform:scale(1)}
}
@keyframes sparkFly{
  0%  {transform:translate(0,0) scale(1);   opacity:1}
  100%{transform:translate(var(--sx),var(--sy)) scale(0); opacity:0}
}
@keyframes emberRise{
  0%  {transform:translateY(0)   scale(1);   opacity:1}
  100%{transform:translateY(-55px) scale(0); opacity:0}
}
@keyframes ringFire{
  0%  {transform:translate(-50%,-50%) scale(0); opacity:.9; border-color:#f97316}
  60% {opacity:.5}
  100%{transform:translate(-50%,-50%) scale(5); opacity:0; border-color:#fbbf24}
}
.live-dollar{display:inline-flex;align-items:center;transition:all .3s;position:relative;cursor:default}
.live-dollar.loading{animation:dollarLoading .65s ease-in-out infinite}
.live-dollar.fired {animation:dollarFireUp 1.1s cubic-bezier(.34,1.56,.64,1) forwards}
.live-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:var(--white);border:1px solid var(--border);border-radius:50px;padding:4px 12px;box-shadow:var(--card-shadow);transition:all .3s;position:relative;overflow:visible}
.live-badge.on-fire{animation:badgeFire 1.5s cubic-bezier(.34,1.56,.64,1) forwards}
.spark{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:9999;animation:sparkFly .75s ease-out forwards}
.ember{position:fixed;width:4px;height:10px;border-radius:3px;pointer-events:none;z-index:9999;animation:emberRise .9s ease-out forwards}
.fire-ring{position:absolute;left:50%;top:50%;width:28px;height:28px;border-radius:50%;border:3px solid #f97316;pointer-events:none;animation:ringFire .8s ease-out forwards}

/* MAIN CARD */
.main-card{width:100%;max-width:560px;background:var(--white);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:var(--card-shadow);margin-bottom:16px;transition:all .3s}

.field-label{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;transition:color .3s}
.selector-row{display:flex;gap:8px;margin-bottom:16px}
.currency-select-wrapper{position:relative;flex:1}
.currency-select{width:100%;appearance:none;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:600;padding:12px 16px 12px 36px;outline:none;cursor:pointer;transition:all .3s}
.currency-select:hover{border-color:var(--border-focus);background:var(--white)}
.currency-select:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.select-arrow{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:10px;transition:color .3s}
.amount-wrapper{position:relative;width:140px;flex-shrink:0}
.amount-input{font-variant-numeric:lining-nums;unicode-bidi:plaintext;direction:ltr;width:100%;background:var(--blue-light);border:1.5px solid var(--border-focus);border-radius:12px;color:var(--blue);font-family:'Tajawal',sans-serif;font-size:1.25rem;font-weight:800;padding:11px 12px;text-align:center;outline:none;transition:all .3s}
.amount-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.amount-input::placeholder{color:var(--muted2);font-weight:400;font-size:.9rem}

.swap-row{display:flex;align-items:center;gap:12px;margin:0 0 16px}
.divider-line{flex:1;height:1px;background:var(--border);transition:background .3s}
.swap-btn{display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.swap-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.swap-icon{font-size:.95rem;transition:transform .3s}
.swap-btn:hover .swap-icon{transform:rotate(180deg)}

.convert-btn{width:100%;background:var(--blue);border:none;border-radius:14px;color:#fff;font-family:'Tajawal',sans-serif;font-size:1.05rem;font-weight:800;padding:15px;cursor:pointer;letter-spacing:1.5px;transition:all .25s;box-shadow:var(--btn-shadow)}
.convert-btn:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:var(--btn-hover-shadow)}
.convert-btn:active{transform:translateY(0)}

/* RESULT */
.result-card{margin-top:16px;background:var(--result-bg);border:1.5px solid var(--result-border);border-radius:16px;padding:24px;text-align:center;display:none;position:relative;overflow:hidden;transition:all .3s}
.result-card.visible{display:block}
.result-from{font-size:.82rem;color:var(--muted);margin-bottom:8px;transition:color .3s}
.result-equals{font-size:clamp(2.2rem,7vw,3.2rem);font-weight:900;color:var(--blue);line-height:1;margin-bottom:6px;transition:color .3s}
.result-to-name{font-size:.95rem;color:var(--text);font-weight:600;margin-bottom:14px;transition:color .3s}
.result-divider{height:1px;background:var(--result-border);opacity:.5;margin-bottom:12px;transition:background .3s}
.rate-note{font-size:.75rem;color:var(--muted);direction:ltr;transition:color .3s}

/* RATES SECTION */
.rates-section{width:100%;max-width:560px;margin-top:8px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.section-title{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;transition:color .3s}
.section-line{flex:1;height:1px;background:var(--border);transition:background .3s}
.rates-grid{display:flex;flex-direction:column;gap:4px}
.rate-row{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .18s}
.rate-row:hover{border-color:var(--border-focus);background:var(--blue-light);transform:translateX(-3px)}
.rate-flag{font-size:1.5rem;line-height:1}
.rate-info{flex:1}
.rate-name{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:1px;transition:color .3s}
.rate-code{font-size:.68rem;color:var(--muted);font-weight:500;letter-spacing:1px;transition:color .3s}
.rate-values{text-align:left}
.rate-main{font-size:.92rem;font-weight:800;color:var(--blue);direction:ltr;white-space:nowrap;transition:color .3s}
.rate-sub{font-size:.66rem;color:var(--muted);direction:ltr;white-space:nowrap;transition:color .3s}

/* ===== AI ANALYSIS SECTION ===== */
.ai-section{width:100%;max-width:560px;margin-top:8px}
.ai-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--card-shadow);transition:all .3s}
.ai-card-header{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}
.ai-header-icon{font-size:1.4rem}
.ai-header-title{flex:1;font-size:.95rem;font-weight:800;color:var(--text);transition:color .3s}
.ai-header-badge{font-size:.65rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:50px;padding:3px 10px;font-weight:800}
.ai-controls{padding:14px 18px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.ai-currency-pick{flex:1;min-width:140px;appearance:none;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:600;padding:9px 12px;outline:none;cursor:pointer;transition:all .3s}
.ai-currency-pick:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.ai-analyze-btn{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;color:#fff;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:800;padding:9px 20px;cursor:pointer;transition:all .25s;white-space:nowrap;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.ai-analyze-btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.45)}
.ai-analyze-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.ai-analyze-btn .btn-spinner{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.ai-analyze-btn.loading .btn-spinner{display:inline-block}
.ai-analyze-btn.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-result{padding:18px;display:none}
.ai-result.visible{display:block}
.ai-direction{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:14px;border-radius:12px;background:var(--bg)}
.ai-dir-icon{font-size:2rem}
.ai-dir-text{flex:1}
.ai-dir-label{font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:2px}
.ai-dir-value{font-size:1.1rem;font-weight:900}
.ai-dir-value.up{color:#16A34A}
.ai-dir-value.down{color:#DC2626}
.ai-dir-value.neutral{color:var(--blue)}
.ai-confidence{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ai-conf-label{font-size:.75rem;color:var(--muted);font-weight:600;white-space:nowrap}
.ai-conf-bar{flex:1;height:8px;background:var(--border);border-radius:50px;overflow:hidden}
.ai-conf-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.ai-conf-pct{font-size:.75rem;font-weight:800;color:var(--blue);white-space:nowrap}
.ai-analysis-text{font-size:.83rem;color:var(--text);line-height:1.8;background:var(--bg);border-radius:10px;padding:14px;border-right:3px solid #8b5cf6;transition:color .3s}
.ai-factors{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
.ai-factor-tag{font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:50px;background:var(--blue-light);color:var(--blue);border:1px solid var(--border-focus)}
.ai-disclaimer{font-size:.68rem;color:var(--muted2);margin-top:10px;text-align:center;font-style:italic}
.ai-error{padding:16px 18px;color:#DC2626;font-size:.83rem;display:none}
.ai-error.visible{display:block}

/* Typing animation */
@keyframes typingDots{0%,100%{opacity:.3}50%{opacity:1}}
.ai-typing{display:flex;align-items:center;gap:4px;padding:18px}
.ai-typing span{width:7px;height:7px;border-radius:50%;background:#8b5cf6;animation:typingDots .9s ease-in-out infinite}
.ai-typing span:nth-child(2){animation-delay:.15s}
.ai-typing span:nth-child(3){animation-delay:.3s}


@media(max-width:480px){.main-card{padding:18px 16px}.amount-wrapper{width:110px}.amount-input{font-size:1.1rem}.theme-btn{padding:6px 10px;font-size:.68rem}}

/* ===== RIPPLE ===== */
.ripple-host{position:relative;overflow:hidden}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.35);transform:scale(0);animation:rippleAnim .55s linear;pointer-events:none}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* ===== RESULT ANIMATIONS ===== */
@keyframes resultPop{
  0%{opacity:0;transform:scale(.82) translateY(20px)}
  60%{opacity:1;transform:scale(1.05) translateY(-5px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes shimmerSlide{
  0%{transform:translateX(150%) skewX(-15deg)}
  100%{transform:translateX(-150%) skewX(-15deg)}
}
@keyframes numCountUp{
  0%{opacity:0;transform:translateY(24px) scale(.75)}
  55%{opacity:1;transform:translateY(-5px) scale(1.08)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes fadeSlideUp{
  0%{opacity:0;transform:translateY(10px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes glowBreath{
  0%,100%{box-shadow:0 0 16px rgba(37,99,235,.2), 0 6px 28px rgba(37,99,235,.1)}
  50%{box-shadow:0 0 40px rgba(37,99,235,.45), 0 12px 48px rgba(37,99,235,.22)}
}
@keyframes borderPulse{
  0%,100%{border-color:var(--border-focus)}
  50%{border-color:var(--blue)}
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
  80%{opacity:.7}
  100%{opacity:0;transform:translateY(70px) rotate(480deg) scale(.4)}
}
@keyframes starBurst{
  0%{opacity:1;transform:translate(-50%,-50%) scale(0)}
  60%{opacity:.9;transform:translate(-50%,-50%) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}
}
@keyframes gradientShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Result card entrance */
.result-card.visible{
  display:block;
  animation:resultPop .5s cubic-bezier(.34,1.56,.64,1) forwards,
             glowBreath 2.8s 0.6s ease-in-out infinite,
             borderPulse 2.8s 0.6s ease-in-out infinite;
}

/* Shimmer sweep overlay */
.result-card.visible::after{
  content:'';
  position:absolute;
  top:0;left:0;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
  animation:shimmerSlide .9s .35s ease-in-out forwards;
  pointer-events:none;
  border-radius:inherit;
  z-index:2;
}

/* Big number */
.result-equals.animate{
  display:inline-block;
  animation:numCountUp .55s .05s cubic-bezier(.34,1.56,.64,1) both;
  background:linear-gradient(135deg,#1d4ed8 0%,#2563EB 35%,#60A5FA 65%,#2563EB 100%);
  background-size:250% 250%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:numCountUp .55s .05s cubic-bezier(.34,1.56,.64,1) both,
            gradientShift 3s 0.6s ease infinite;
}

/* Sub-elements staggered entrance */
.result-from.anim{opacity:0;animation:fadeSlideUp .38s .18s ease forwards}
.result-to-name.anim{opacity:0;animation:fadeSlideUp .38s .30s ease forwards}
.result-divider.anim{opacity:0;animation:fadeSlideUp .38s .40s ease forwards}
.rate-note.anim{opacity:0;animation:fadeSlideUp .38s .48s ease forwards}

/* Confetti pieces */
.confetti-piece{
  position:absolute;
  width:8px;height:8px;
  border-radius:2px;
  pointer-events:none;
  z-index:5;
  animation:confettiFall 1s ease-out forwards;
}

/* Dark mode overrides */
[data-theme="dark"] .result-equals.animate{
  background:linear-gradient(135deg,#EF4444 0%,#F87171 40%,#FCA5A5 65%,#EF4444 100%);
  background-size:250% 250%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:numCountUp .55s .05s cubic-bezier(.34,1.56,.64,1) both,
            gradientShift 3s 0.6s ease infinite;
